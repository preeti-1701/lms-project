<h2>Users</h2>

<form method="POST">
    <input name="email" placeholder="Email" required>
    <input name="password" placeholder="Password" required>
    <select name="role">
        <option>Admin</option>
        <option>Student</option>
    </select>
    <button>Add User</button>
</form>

<hr>

{% for user in users %}
<p>{{ user.email }} - {{ user.role }}</p>
{% endfor %}
