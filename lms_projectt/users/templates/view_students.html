{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">

</head>
<body>
    <div class="container">
    <h2>Students in {{ course.title }}</h2>

    {% for e in enrollments %}
        <div class="card">
            <p>{{ e.username }}</p>
        </div>
    {% empty %}
        <p>No students enrolled</p>
    {% endfor %}
</div>
</body>
</html>
