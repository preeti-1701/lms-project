



<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}LMS{% endblock %}</title>
</head>

<body>

<!-- 🔴 GLOBAL WATERMARK -->
{% if request.session.user_email %}
<div style="
    position: fixed;
    top: 10px;
    right: 20px;
    background: red;
    color: white;
    padding: 6px 10px;
    z-index: 9999;
    opacity: 0.7;
    font-size: 14px;
">
    {{ request.session.user_email }}
</div>
{% endif %}

<!-- PAGE CONTENT -->
{% block content %}
{% endblock %}

</body>
</html>
