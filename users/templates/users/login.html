{% extends 'base.html' %}

{% block content %}


<!DOCTYPE html>
<html>
<head>
    <title>LMS Login</title>
</head>
<body>

    {% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

    <h2>Login Page</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password"><br><br>

        <button type="submit">Login</button>
    </form>

</body>
</html>

{% endblock %}
