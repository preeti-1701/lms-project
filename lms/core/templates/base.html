<!DOCTYPE html>
<html>
<head>
    <title>LMS</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        button {
            padding: 8px 12px;
            background: #3498db;
            border: none;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div>LMS System</div>
    <div><a href="/logout/" style="color:white;">Logout</a></div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
