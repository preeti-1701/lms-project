<!DOCTYPE html>
<html>
<head>
<title>{{ course.title }}</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f1f5f9;
}

.container {
    padding: 40px;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

.link-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 16px;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    color: white;
    border-radius: 8px;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="container">

<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>

<h3>Course Videos</h3>

{% for video in videos %}
    <div class="card">
        <h4>{{ video.title }}</h4>

        <!-- ✅ Opens YouTube -->
        <a href="{{ video.video_url }}" target="_blank" class="link-btn">
            ▶ Watch Video
        </a>
    </div>
{% empty %}
    <p>No videos available</p>
{% endfor %}

<br>
<a href="{% url 'dashboard' %}">⬅ Back</a>

</div>

</body>
</html>
