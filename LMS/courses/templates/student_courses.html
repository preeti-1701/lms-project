{% extends 'layout.html' %}

{% block content %}

<h2>My Courses</h2>

{% for e in enrollments %}
<div class="card p-3 mb-3">
    <h5>{{ e.course.title }}</h5>
    <p>{{ e.course.description }}</p>
    <a href="/courses/course/{{ e.course.id }}/" class="btn btn-primary">Watch</a>
</div>
{% empty %}
<p>No courses enrolled yet.</p>
{% endfor %}

{% endblock %}
