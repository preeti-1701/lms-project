<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .timer {
            text-align: right;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 20px;
        }

        .question {
            margin-bottom: 20px;
        }

        .question h3 {
            color: #444;
        }

        .options {
            margin-top: 10px;
        }

        .options label {
            display: block;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .options label:hover {
            background: #f1f1f1;
        }

        input[type="radio"] {
            margin-right: 8px;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #5b86e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #3b6cd4;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Quiz</h2>

<p class="timer"> Time Left: <span id="timer"></span></p>

<form method="POST" action="/courses/quiz/{{ quiz.id }}/">
  {% csrf_token %}

  {% for q in questions %}
    <div class="question">
        <h3>{{ forloop.counter }}. {{ q.text }}</h3>

        <div class="options">
            <label>
                <input type="radio" name="q{{ q.id }}" value="1" required>
                {{ q.option1 }}
            </label>

            <label>
                <input type="radio" name="q{{ q.id }}" value="2" required>
                {{ q.option2 }}
            </label>

            <label>
                <input type="radio" name="q{{ q.id }}" value="3" required>
                {{ q.option3 }}
            </label>

            <label>
                <input type="radio" name="q{{ q.id }}" value="4" required>
                {{ q.option4 }}
            </label>
        </div>
    </div>
  {% endfor %}

  <button type="submit" class="submit-btn">Submit Quiz</button>
</form>

</div>

<script>
let time = {{ quiz.duration }} * 60;

setInterval(function() {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    document.getElementById("timer").innerHTML =
        minutes + ":" + (seconds < 10 ? "0" + seconds : seconds);

    time--;

    if (time < 0) {
        alert("Time Up!");
        document.querySelector("form").submit();
    }
}, 1000);
</script>

</body>
</html>
