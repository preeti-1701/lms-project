{% extends 'base.html' %}

{% block title %}Trainer Dashboard - LMS{% endblock %}

{% block content %}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h1>Trainer Dashboard</h1>
        <span class="btn btn-outline" style="border-color: #f59e0b; color: #f59e0b;">Role: {{ user.get_role_display }}</span>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
        <!-- Assigned Courses -->
        <div class="card">
            <h3>My Assigned Courses</h3>
            <p style="color: var(--text-light); margin: 1rem 0;"></p>
            <ul style="list-style: none; padding: 0;">
                <li style="padding: 0.5rem 0; border-bottom: 1px solid var(--border);">No courses assigned yet.</li>
            </ul>
        </div>

        <!-- Course Management -->
        <div class="card">
            <h3>Course Management</h3>
            <p style="color: var(--text-light); margin-bottom: 1.5rem;">Manage your learning materials.</p>
            <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                <button class="btn btn-primary" disabled>Add New Material</button>
                <button class="btn btn-outline" disabled>Upload YouTube Link</button>
                <button class="btn btn-outline" disabled>View Student Progress</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
