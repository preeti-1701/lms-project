<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduVerse – Video Player</title>
  <meta name="description" content="Secure course video player with watermark protection."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="dashboard.css"/>
  <style>
    body { background: var(--bg-base); }
    .player-page { display:flex; flex-direction:column; min-height:100vh; }
    .player-topbar {
      height:var(--header-h); background:rgba(8,14,28,0.9); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border); display:flex; align-items:center;
      padding:0 24px; gap:16px; position:sticky; top:0; z-index:100;
    }
    .player-topbar a { color:var(--text-secondary); font-size:0.83rem; display:flex; align-items:center; gap:6px; transition:color var(--transition); }
    .player-topbar a:hover { color:var(--text-primary); }
    .player-topbar h1 { flex:1; font-size:0.95rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .player-body { flex:1; display:grid; grid-template-columns:1fr 310px; gap:20px; padding:20px; }
    .player-col { display:flex; flex-direction:column; gap:16px; min-width:0; }

    .player-wrapper { position:relative; width:100%; aspect-ratio:16/9; background:#000; border-radius:var(--radius-lg); overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.7); }
    .player-wrapper iframe { position:absolute; inset:0; width:100%; height:100%; border:none; z-index:1; }
    .player-overlay { position:absolute; inset:0; z-index:5; }
    .watermark { position:absolute; pointer-events:none; z-index:10; color:rgba(255,255,255,0.13); font-size:0.9rem; font-weight:600; font-family:var(--font); transform:rotate(-25deg); white-space:nowrap; user-select:none; -webkit-user-select:none; transition:top 3s ease, left 3s ease; }

    .player-info-bar { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
    .player-info-bar h2 { font-size:1.05rem; font-weight:700; margin-bottom:8px; }
    .player-meta { display:flex; gap:18px; font-size:0.8rem; color:var(--text-secondary); flex-wrap:wrap; }
    .player-meta span { display:flex; align-items:center; gap:5px; }
    .player-progress-row { margin-top:14px; }
    .player-progress-label { display:flex; justify-content:space-between; font-size:0.75rem; color:var(--text-muted); margin-bottom:6px; }
    .player-progress-label span:last-child { color:var(--primary); font-weight:700; }
    .player-nav-row { display:flex; gap:10px; margin-top:14px; }

    .notes-panel { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; flex:1; display:flex; flex-direction:column; gap:10px; min-height:160px; }
    .notes-panel h3 { font-size:0.88rem; font-weight:700; display:flex; align-items:center; gap:7px; }
    .notes-textarea { flex:1; background:var(--bg-base); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; color:var(--text-primary); font-size:0.82rem; font-family:var(--font); resize:none; min-height:100px; transition:border-color var(--transition); }
    .notes-textarea:focus { outline:none; border-color:var(--primary); }
    .notes-save-btn { align-self:flex-end; }

    .course-sidebar { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); display:flex; flex-direction:column; overflow:hidden; }
    .sidebar-head { padding:16px; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.15); }
    .sidebar-head h3 { font-size:0.88rem; font-weight:700; margin-bottom:2px; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .sidebar-head p { font-size:0.74rem; color:var(--text-secondary); }
    .sidebar-progress { padding:12px 16px; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.1); }
    .sidebar-progress-label { display:flex; justify-content:space-between; font-size:0.73rem; color:var(--text-muted); margin-bottom:6px; }
    .sidebar-progress-label span:last-child { color:var(--primary); font-weight:600; }
    .vid-list { flex:1; overflow-y:auto; padding:8px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
    .vid-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius-sm); cursor:pointer; transition:background var(--transition); margin-bottom:2px; }
    .vid-item:hover { background:var(--bg-card-hover); }
    .vid-item.active { background:rgba(59,130,246,0.1); border-left:3px solid var(--primary); padding-left:7px; }
    .vid-num { width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:700; color:var(--text-muted); flex-shrink:0; }
    .vid-item.active .vid-num { background:var(--primary); color:#fff; }
    .vid-item.done .vid-num { background:rgba(16,185,129,0.15); color:var(--success); }
    .vid-item-info { flex:1; min-width:0; }
    .vid-item-title { font-size:0.8rem; font-weight:600; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .vid-item-dur { font-size:0.7rem; color:var(--text-muted); margin-top:2px; }
    .vid-check { color:var(--success); flex-shrink:0; width:16px; height:16px; }

    .security-strip { display:flex; align-items:center; gap:12px; padding:10px 16px; background:rgba(239,68,68,0.05); border:1px solid rgba(239,68,68,0.1); border-radius:var(--radius-sm); font-size:0.75rem; color:var(--text-muted); }
    .security-strip svg { color:var(--danger); flex-shrink:0; }

    @media(max-width:900px) {
      .player-body { grid-template-columns:1fr; }
      .course-sidebar { max-height:300px; }
    }
    @media(max-width:640px) {
      .player-topbar { padding:0 12px; }
      .player-body { padding:12px; gap:12px; }
    }
  </style>
</head>
<body>
<div class="player-page" id="playerPage">

  <!-- Top Bar -->
  <div class="player-topbar">
    <a href="student-dashboard.html" id="backLink">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      My Courses
    </a>
    <span style="color:var(--text-muted);">/</span>
    <h1 id="topbarCourse">Loading…</h1>
    <div class="security-strip">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Secure &amp; Watermarked
    </div>
    <div class="user-chip" style="flex-shrink:0;">
      <div class="user-avatar" id="userAvatar">A</div>
      <span class="user-name" id="userName">Student</span>
    </div>
  </div>

  <div class="player-body">

    <!-- Left col: player + info + notes -->
    <div class="player-col">

      <!-- Player -->
      <div class="player-wrapper" id="playerWrapper">
        <div id="ytPlayerContainer"></div>
        <div class="player-overlay" id="playerOverlay" oncontextmenu="return false;"></div>
        <div class="watermark" id="watermarkEl">EduVerse User</div>
      </div>

      <!-- Info bar -->
      <div class="player-info-bar">
        <h2 id="videoTitle">Loading video…</h2>
        <div class="player-meta">
          <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg><span id="courseName">—</span></span>
          <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span id="trainerName">—</span></span>
          <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span id="videoDuration">—</span></span>
          <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>Video <span id="videoIndex">1</span> of <span id="videoTotal">—</span></span>
        </div>
        <div class="player-progress-row">
          <div class="player-progress-label"><span>Your progress on this video</span><span id="videoProgressPct">0%</span></div>
          <div class="progress-bar"><div class="progress-fill" id="videoProgressFill" style="width:0%"></div></div>
        </div>
        <div class="player-nav-row">
          <button class="btn-secondary" id="prevBtn" onclick="navigateVideo(-1)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Previous
          </button>
          <button class="btn-primary" id="nextBtn" onclick="navigateVideo(1)">
            Next
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button class="btn-secondary" id="markDoneBtn" onclick="markVideoComplete()" style="margin-left:auto;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            Mark Done
          </button>
        </div>
      </div>

      <!-- Notes -->
      <div class="notes-panel">
        <h3>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          My Notes
        </h3>
        <textarea class="notes-textarea" id="notesArea" placeholder="Jot down your notes here… They're saved automatically per video."></textarea>
        <button class="btn-sm btn-sm-primary notes-save-btn" onclick="saveNotes()">Save Notes</button>
      </div>
    </div>

    <!-- Right col: course playlist sidebar -->
    <div class="course-sidebar">
      <div class="sidebar-head">
        <h3 id="sidebarCourse">Course</h3>
        <p id="sidebarVideoCount">— videos</p>
      </div>
      <div class="sidebar-progress">
        <div class="sidebar-progress-label"><span>Course progress</span><span id="sidebarProgressPct">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="sidebarProgressFill" style="width:0%"></div></div>
      </div>
      <div class="vid-list" id="vidList"></div>
    </div>

  </div><!-- .player-body -->
</div><!-- .player-page -->

<div id="dashToast" class="dash-toast"></div>

<script src="dashboard.js"></script>
<script src="player.js"></script>
</body>
</html>
