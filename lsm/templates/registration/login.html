<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LMS</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.88);
            --panel-border: rgba(148, 163, 184, 0.18);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-strong: #0ea5e9;
            --danger: #f87171;
            --shadow: 0 30px 80px rgba(15, 23, 42, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.28), transparent 34%),
                radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.18), transparent 30%),
                linear-gradient(135deg, #020617 0%, #0f172a 50%, #111827 100%);
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .eyebrow {
            margin: 0 0 10px;
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2rem;
            line-height: 1.1;
        }

        .subtitle {
            margin: 0 0 28px;
            color: var(--muted);
            line-height: 1.6;
        }

        .messages {
            margin: 0 0 18px;
            padding: 0;
            list-style: none;
        }

        .messages li {
            margin-bottom: 10px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(248, 113, 113, 0.12);
            color: #fecaca;
            border: 1px solid rgba(248, 113, 113, 0.28);
        }

        form {
            display: grid;
            gap: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.95);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: rgba(56, 189, 248, 0.7);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.16);
        }

        .button {
            appearance: none;
            border: 0;
            border-radius: 14px;
            padding: 14px 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(14, 165, 233, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 32px rgba(14, 165, 233, 0.35);
        }

        .footer-note {
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
            text-align: center;
        }

        @media (max-width: 480px) {
            .card {
                padding: 28px 22px;
                border-radius: 20px;
            }

            h1 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="eyebrow">Learning Management System</p>
        <h1>Sign in</h1>
        <!-- <p class="subtitle">Use your account to access courses, videos, and admin tools.</p> -->

        {% if form.errors %}
            <ul class="messages">
                <li>Your username and password did not match. Please try again.</li>
            </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div>
                <label for="id_username">Username</label>
                <input type="text" name="username" autofocus autocomplete="username" required id="id_username">
            </div>

            <div>
                <label for="id_password">Password</label>
                <input type="password" name="password" autocomplete="current-password" required id="id_password">
            </div>

            <button class="button" type="submit">Log in</button>

            <input type="hidden" name="next" value="{{ next }}">
        </form>

        <!-- <p class="footer-note">If you need an account, contact your LMS administrator.</p> -->
    </main>
</body>
</html>
