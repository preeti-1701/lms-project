<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <style>
        body { font-family: Arial; background:#f4f6f9; }

        .header {
            background:#1e3a8a;
            color:white;
            padding:15px;
            text-align:center;
        }

        .container {
            padding:20px;
        }

        .card {
            background:white;
            padding:15px;
            margin:10px 0;
            border-radius:10px;
        }

        .btn {
            background:#2563eb;
            color:white;
            padding:8px 12px;
            text-decoration:none;
            border-radius:5px;
            display:inline-block;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>👨‍🎓 Student Dashboard</h1>
</div>

<div class="container">

    <h2>Available Courses</h2>

    {% for course in courses %}
        <div class="card">
            <h3>{{ course.title }}</h3>
            <p>{{ course.description }}</p>
            <p><b>Duration:</b> {{ course.duration }}</p>

            <a class="btn" href="/course/{{ course.id }}/videos/">
                ▶ View Videos
            </a>
        </div>
    {% empty %}
        <p>No active courses available.</p>
    {% endfor %}

</div>

</body>
</html>
