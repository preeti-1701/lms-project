<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial; background:#f4f6f9; margin:0; }

        .header {
            background:#111827;
            color:white;
            padding:15px;
            text-align:center;
        }

        .container {
            padding:20px;
        }

        .card {
            background:white;
            padding:20px;
            margin:10px 0;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        .btn {
            background:#2563eb;
            color:white;
            padding:10px 15px;
            text-decoration:none;
            border-radius:5px;
            display:inline-block;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>👑 Admin Dashboard</h1>
</div>

<div class="container">

    <div class="card">
        <h2>Manage Users</h2>
        <p>Admins can manage trainers and students</p>
    </div>

    <div class="card">
        <h2>Manage Courses</h2>
        <p>Create, edit, delete all courses</p>
    </div>

    <div class="card">
        <h2>System Control</h2>
        <p>Full access to LMS system</p>
    </div>

</div>

</body>
</html>
