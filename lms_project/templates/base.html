<!DOCTYPE html>
<html>
<head>
    <title>LMS</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
        }

        h1 {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            margin: 0;
        }

        .navbar {
            background-color: #ecf0f1;
            padding: 10px 20px;
        }

        .navbar a {
            text-decoration: none;
            color: #3498db;
            margin-right: 10px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
        }

        .card {
            background-color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 5px;
            box-shadow: 0px 0px 5px rgba(0,0,0,0.1);
        }
        .course-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.course-card {
    background-color: white;
    padding: 15px;
    width: 250px;
    border-radius: 8px;
    box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
    transition: transform 0.2s;
}

.course-card:hover {
    transform: scale(1.03);
}

.course-title {
    font-size: 18px;
    font-weight: bold;
    color: #2c3e50;
}

.course-trainer {
    font-size: 14px;
    color: #555;
    margin-top: 5px;
}
    </style>

</head>
<body>

<h1>LMS System</h1>

<div class="navbar">
{% if user.is_authenticated %}
    Logged in as: <b>{{ user.username }}</b> | Role: {{ user.role }}
    <br>
    <a href="/">Home</a>
    <a href="/logout/">Logout</a>
{% else %}
    <a href="/login/">Login</a>
{% endif %}
</div>

<div class="container">
{% block content %}
{% endblock %}
</div>

</body>
</html>
