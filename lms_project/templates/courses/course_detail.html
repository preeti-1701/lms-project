{% extends 'base.html' %}

{% block content %}

<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>

<h3>Course Videos</h3>

<div class="course-grid">

{% for video in videos %}
    
    <div class="course-card">
        
        <div class="course-title">
            {{ video.title }}
        </div>

        <iframe width="100%" height="200"
            src="https://www.youtube.com/embed/{{ video.youtube_link|cut:'https://www.youtube.com/watch?v=' }}"
            frameborder="0"
            allowfullscreen>
        </iframe>

    </div>

{% empty %}

    <p>No videos available</p>

{% endfor %}

</div>

{% endblock %}
