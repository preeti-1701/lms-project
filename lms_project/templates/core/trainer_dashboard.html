{% extends 'base.html' %}

{% block content %}

<h2>Trainer Dashboard</h2>

<h3>Your Courses</h3>

<div class="course-grid">
{% for course in courses %}
    <div class="course-card">
        <div class="course-title">
            {{ course.title }}
        </div>

        <div class="course-trainer">
            You are the trainer
        </div>
    </div>
{% empty %}
    <p>No courses assigned</p>
{% endfor %}
</div>

{% endblock %}
