{% extends 'base.html' %}
{% block title %}Create Quiz{% endblock %}
{% block content %}
<div class="card" style="max-width:700px; margin:0 auto;">
    <h2>📝 Create Quiz for "{{ video.title }}"</h2>
    <p style="color:var(--text2); margin-bottom:24px; font-size:13px;">
        Add questions below. Click "Add Question" to add more.
    </p>
    <form method="POST" id="quiz-form">
        {% csrf_token %}
        <div id="questions-container">
            <div class="question-block" style="padding:20px; background:var(--bg);
                border-radius:10px; margin-bottom:16px; border:1px solid var(--border);">
                <h3 style="margin-bottom:16px; color:var(--text); font-size:15px;">Question 1</h3>
                <div class="form-group">
                    <label>Question Text</label>
                    <input type="text" name="q1_text" required placeholder="Enter question...">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Option A</label>
                        <input type="text" name="q1_a" required placeholder="Option A">
                    </div>
                    <div class="form-group">
                        <label>Option B</label>
                        <input type="text" name="q1_b" required placeholder="Option B">
                    </div>
                    <div class="form-group">
                        <label>Option C</label>
                        <input type="text" name="q1_c" required placeholder="Option C">
                    </div>
                    <div class="form-group">
                        <label>Option D</label>
                        <input type="text" name="q1_d" required placeholder="Option D">
                    </div>
                </div>
                <div class="form-group">
                    <label>Correct Answer</label>
                    <select name="q1_correct" required>
                        <option value="a">A</option>
                        <option value="b">B</option>
                        <option value="c">C</option>
                        <option value="d">D</option>
                    </select>
                </div>
            </div>
        </div>
        <button type="button" onclick="addQuestion()"
            class="btn btn-secondary" style="margin-bottom:16px;">
            + Add Question
        </button>
        <br>
        <button type="submit" class="btn btn-primary">Create Quiz</button>
        <a href="{% url 'course_detail' video.course.id %}"
            class="btn btn-secondary" style="margin-left:10px;">Cancel</a>
    </form>
</div>
<script>
    let count = 1;
    function addQuestion() {
        count++;
        const container = document.getElementById('questions-container');
        container.innerHTML += `
        <div class="question-block" style="padding:20px; background:var(--bg);
            border-radius:10px; margin-bottom:16px; border:1px solid var(--border);">
            <h3 style="margin-bottom:16px; color:var(--text); font-size:15px;">Question ${count}</h3>
            <div class="form-group">
                <label>Question Text</label>
                <input type="text" name="q${count}_text" required placeholder="Enter question...">
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Option A</label>
                    <input type="text" name="q${count}_a" required placeholder="Option A">
                </div>
                <div class="form-group">
                    <label>Option B</label>
                    <input type="text" name="q${count}_b" required placeholder="Option B">
                </div>
                <div class="form-group">
                    <label>Option C</label>
                    <input type="text" name="q${count}_c" required placeholder="Option C">
                </div>
                <div class="form-group">
                    <label>Option D</label>
                    <input type="text" name="q${count}_d" required placeholder="Option D">
                </div>
            </div>
            <div class="form-group">
                <label>Correct Answer</label>
                <select name="q${count}_correct" required>
                    <option value="a">A</option>
                    <option value="b">B</option>
                    <option value="c">C</option>
                    <option value="d">D</option>
                </select>
            </div>
        </div>`;
    }
</script>
{% endblock %}
