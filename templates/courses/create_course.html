{% extends 'base.html' %}
{% block title %}Create Course{% endblock %}
{% block content %}

<div class="card" style="max-width:720px; margin:0 auto;">
    <h2>📚 Create New Course</h2>
    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Course Title</label>
            <input type="text" name="title" required
                placeholder="e.g. Python for Beginners">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4"
                placeholder="What will students learn?"
                style="width:100%; padding:12px 16px; border:1.5px solid var(--border);
                border-radius:10px; font-size:14px; background:var(--input-bg);
                color:var(--text); font-family:'DM Sans',sans-serif; resize:vertical;"
                onfocus="this.style.borderColor='#e94560'"
                onblur="this.style.borderColor='var(--border)'">
            </textarea>
        </div>

        <!-- 📅 Scheduling -->
        <div style="background:var(--bg); border-radius:12px; padding:20px;
            border:1px solid var(--border); margin-bottom:18px;">
            <div style="font-family:'Syne',sans-serif; font-weight:700;
                font-size:14px; margin-bottom:16px; color:var(--text);">
                📅 Course Schedule (Optional)
            </div>
            <div class="grid-3">
                <div class="form-group" style="margin-bottom:0;">
                    <label>Start Date</label>
                    <input type="date" name="start_date">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>End Date</label>
                    <input type="date" name="end_date">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Enrollment Deadline</label>
                    <input type="date" name="enrollment_deadline">
                </div>
            </div>
        </div>

        <!-- Assign Students -->
        <div class="form-group">
            <label>Assign Students</label>
            <div style="border:1.5px solid var(--border); border-radius:10px;
                padding:12px; max-height:220px; overflow-y:auto;
                background:var(--input-bg);">
                {% for student in students %}
                <label style="display:flex; align-items:center; gap:10px;
                    padding:8px 6px; cursor:pointer; border-radius:8px;
                    transition:background 0.15s; font-weight:400;"
                    onmouseover="this.style.background='var(--bg)'"
                    onmouseout="this.style.background=''">
                    <input type="checkbox" name="students" value="{{ student.id }}"
                        style="width:16px; height:16px; accent-color:#e94560;">
                    <div style="width:30px; height:30px;
                        background:linear-gradient(135deg,#e94560,#f7b731);
                        border-radius:50%; display:flex; align-items:center;
                        justify-content:center; font-size:12px;
                        font-weight:700; color:white; flex-shrink:0;">
                        {{ student.full_name|first }}
                    </div>
                    <div>
                        <div style="font-size:14px; color:var(--text);">
                            {{ student.full_name }}
                        </div>
                        <div style="font-size:12px; color:var(--text2);">
                            {{ student.email }}
                        </div>
                    </div>
                </label>
                {% empty %}
                <p style="color:var(--text2); font-size:13px; padding:10px;">
                    No students available.
                </p>
                {% endfor %}
            </div>
        </div>

        <div style="display:flex; gap:12px;">
            <button type="submit" class="btn btn-primary">Create Course</button>
            <a href="{% url 'course_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
