{% extends 'base.html' %}
{% block title %}New Discussion{% endblock %}
{% block content %}

<div class="card" style="max-width:680px; margin:0 auto;">
    <h2>💬 Start a New Discussion</h2>
    <p style="color:var(--text2); font-size:13px; margin-bottom:24px;">
        in <strong style="color:#e94560;">{{ course.title }}</strong>
    </p>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" required
                placeholder="e.g. Question about Module 2...">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="body" rows="6" required
                placeholder="Describe your question or topic in detail..."
                style="width:100%; padding:12px 16px; border:1.5px solid var(--border);
                border-radius:10px; font-size:14px; background:var(--input-bg);
                color:var(--text); font-family:'DM Sans',sans-serif;
                resize:vertical; transition:border 0.2s;"
                onfocus="this.style.borderColor='#e94560'; this.style.boxShadow='0 0 0 3px rgba(233,69,96,0.1)'"
                onblur="this.style.borderColor='var(--border)'; this.style.boxShadow=''">
            </textarea>
        </div>
        <div style="display:flex; gap:12px;">
            <button type="submit" class="btn btn-primary">Post Discussion</button>
            <a href="{% url 'discussion_list' course.id %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
