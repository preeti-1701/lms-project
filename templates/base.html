<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LMS{% endblock %} — NewGen LMS</title>
  <meta name="description" content="{% block meta_description %}Learning Management System{% endblock %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
  {% block extra_css %}{% endblock %}
</head>
<body>

<div class="app-layout" id="app-layout" style="display:none;">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">N</div>
      <div>
        <div class="sidebar-logo-text">NewGen LMS</div>
        <div class="sidebar-logo-sub">Learning Platform</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Populated by JS based on JWT user role -->
    </nav>

    <div class="sidebar-footer">
      <div class="dropdown">
        <div class="user-chip" data-dropdown-toggle="user-menu">
          <div class="user-avatar" id="user-avatar">?</div>
          <div class="user-info">
            <div class="user-name" id="user-name">Loading...</div>
            <div class="user-role" id="user-role"></div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted-foreground)"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div class="dropdown-menu" id="user-menu" style="bottom:100%;top:auto;margin-bottom:4px;">
          <div class="dropdown-sep"></div>
          <button class="dropdown-item danger" onclick="logoutUser()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <!-- Page header breadcrumb -->
    <header class="page-header">
      <div class="flex items-center gap-3">
        <button class="btn btn-ghost btn-icon" id="sidebar-toggle" style="display:none" onclick="document.getElementById('sidebar').classList.toggle('open')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="text-xs text-muted" style="margin-bottom:2px;">{% block breadcrumb %}Home{% endblock %}</div>
          <h1 class="page-title" style="font-size:1rem;">{% block page_heading %}{% endblock %}</h1>
        </div>
      </div>
      <div class="flex items-center gap-2">{% block page_actions %}{% endblock %}</div>
    </header>

    <main class="page-body">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<div id="toast-container"></div>

{% load static %}
<script src="{% static 'js/app.js' %}"></script>
<script>
// ── JWT Auth Guard ────────────────────────────────────────────────
(function() {
  const token = localStorage.getItem('lms_access_token');
  const userStr = localStorage.getItem('lms_user');
  if (!token || !userStr) {
    window.location.href = '/login/';
    return;
  }

  const user = JSON.parse(userStr);

  // Show the layout now that we know the user is authenticated
  document.getElementById('app-layout').style.display = '';

  // Populate user info in sidebar
  document.getElementById('user-avatar').textContent = (user.full_name || user.email || '?')[0].toUpperCase();
  document.getElementById('user-name').textContent = user.full_name || user.email;
  document.getElementById('user-role').textContent = user.role || '';

  // Build nav based on role
  const role = user.role;
  const navEl = document.getElementById('sidebar-nav');
  let navHTML = '<div class="sidebar-section-label">Main</div>';

  if (role === 'ADMIN') {
    navHTML += `<a class="nav-item" href="/dashboard/admin/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>`;
  } else if (role === 'TRAINER') {
    navHTML += `<a class="nav-item" href="/dashboard/trainer/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>`;
  } else {
    navHTML += `<a class="nav-item" href="/my-courses/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>My Courses</a>`;
  }

  navHTML += '<div class="sidebar-section-label">Courses</div>';
  navHTML += `<a class="nav-item" href="/courses/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Courses</a>`;

  if (role !== 'STUDENT') {
    navHTML += `<a class="nav-item" href="/courses/new/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>New Course</a>`;
  }

  if (role === 'ADMIN') {
    navHTML += '<div class="sidebar-section-label">Administration</div>';
    navHTML += `<a class="nav-item" href="/admin-panel/users/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Users</a>`;
    navHTML += `<a class="nav-item" href="/enrollments/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Enrollments</a>`;
    navHTML += `<a class="nav-item" href="/security/logs/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Security Logs</a>`;
  }

  navEl.innerHTML = navHTML;

  // Highlight current active nav item
  const currentPath = window.location.pathname;
  navEl.querySelectorAll('.nav-item').forEach(a => {
    if (a.getAttribute('href') === currentPath) a.classList.add('active');
  });
})();

function logoutUser() {
  localStorage.removeItem('lms_access_token');
  localStorage.removeItem('lms_refresh_token');
  localStorage.removeItem('lms_user');
  fetch('/api/auth/logout/', { method: 'POST', headers: { 'X-CSRFToken': '{{ csrf_token }}' } })
    .finally(() => { window.location.href = '/login/'; });
}

{% block extra_js %}{% endblock %}
</script>
</body>
</html>
