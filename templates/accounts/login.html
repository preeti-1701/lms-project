<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: #0a0a12;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        .bg-orbs {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 8s ease-in-out infinite;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(233,69,96,0.15);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 350px; height: 350px;
            background: rgba(247,183,49,0.08);
            bottom: -80px; right: -80px;
            animation-delay: 3s;
        }
        .orb-3 {
            width: 250px; height: 250px;
            background: rgba(26,26,46,0.8);
            top: 50%; left: 50%;
            animation-delay: 1.5s;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Grid pattern */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(233,69,96,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(233,69,96,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .login-container {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            padding: 20px;
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box {
            background: rgba(18,18,30,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(233,69,96,0.2);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5),
                        inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #e94560, #f7b731);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin: 0 auto 16px;
            animation: pulse 3s ease-in-out infinite;
            box-shadow: 0 8px 30px rgba(233,69,96,0.4);
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 30px rgba(233,69,96,0.4); transform: scale(1); }
            50% { box-shadow: 0 8px 40px rgba(233,69,96,0.6); transform: scale(1.03); }
        }
        .logo h1 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }
        .logo h1 span { color: #e94560; }
        .logo p { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 6px; }

        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 14px;
            color: white;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #e94560;
            background: rgba(233,69,96,0.05);
            box-shadow: 0 0 0 3px rgba(233,69,96,0.1);
        }
        input::placeholder { color: rgba(255,255,255,0.25); }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e94560, #c73652);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(233,69,96,0.4);
            position: relative;
            overflow: hidden;
        }
        .btn-login::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(233,69,96,0.5); }
        .btn-login:active::after { width: 300px; height: 300px; }

        .alert {
            background: rgba(233,69,96,0.1);
            border: 1px solid rgba(233,69,96,0.3);
            color: #f5a0ae;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="login-container">
    <div class="login-box">
        <div class="logo">
            <div class="logo-icon">🎓</div>
            <h1>LMS <span>Portal</span></h1>
            <p>Learning Management System</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Sign In →</button>
        </form>

        <div class="footer-text">Secure • Monitored • Encrypted</div>
    </div>
</div>
</body>
</html>
