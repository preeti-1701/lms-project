{% include 'base/header.html' %}

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h1 class="fw-bold">
                Trainer Dashboard
            </h1>

            <p class="text-muted">
                Manage and monitor learning content.
            </p>

        </div>

        <span class="badge bg-success fs-6 p-2">
            Trainer
        </span>

    </div>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card dashboard-card p-4 text-center h-100">

                <h1 class="fw-bold">
                    {{ course_count }}
                </h1>

                <p class="text-muted mb-0">
                    Total Courses
                </p>

            </div>

        </div>

        <div class="col-md-8">

            <div class="card dashboard-card p-4 h-100">

                <h3 class="mb-3">
                    Course Management
                </h3>

                <p class="text-muted">
                    View all available LMS training content.
                </p>

                <div class="mt-3">

                    <a href="{% url 'courses' %}"
                       class="btn btn-primary px-4">

                       Open Courses

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% include 'base/footer.html' %}
