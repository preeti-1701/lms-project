{% include 'base/header.html' %}

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="fw-bold">Student Dashboard</h1>

        <span class="badge bg-primary fs-6 p-2">
            {{ user.role|title }}
        </span>

    </div>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card shadow border-0 rounded-4 p-4 text-center h-100">

                <h1 class="fw-bold">
                    {{ user.enrolled_courses.count }}
                </h1>

                <p class="text-muted mb-0">
                    Assigned Courses
                </p>

            </div>

        </div>

        <div class="col-md-8">

            <div class="card shadow border-0 rounded-4 p-4 h-100">

                <h3 class="mb-3">
                    My Courses
                </h3>

                <p class="text-muted">
                    View your assigned learning content and videos.
                </p>

                <div class="mt-3">

                    <a href="{% url 'courses' %}"
                       class="btn btn-primary px-4">

                       Open Courses

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% include 'base/footer.html' %}
