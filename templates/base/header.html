<!DOCTYPE html>
<html>
<head>
    <title>LMS Project</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background-color: #f5f7fb;
        }

        .navbar-custom {
            background: linear-gradient(
                90deg,
                #0f172a,
                #111827,
                #0f172a
            );
            padding-top: 14px;
            padding-bottom: 14px;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .nav-btn {
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 500;
        }

        .profile-box {
            color: white;
            font-weight: 600;
            margin-right: 15px;
        }

        .dashboard-card {
            border: none;
            border-radius: 22px;
            box-shadow: 0px 4px 18px rgba(0,0,0,0.08);
        }

    </style>

</head>

<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">

    <div class="container d-flex justify-content-between align-items-center">

        <a class="logo-text" href="/">
            LMS
        </a>

        <div class="d-flex align-items-center">

            {% if user.is_authenticated %}

                <a class="btn btn-info text-white nav-btn me-3"
                   href="{% url 'courses' %}">

                   Courses

                </a>

                <div class="profile-box">

                    {{ user.username }}

                    <span class="badge bg-warning text-dark ms-2">
                        {{ user.role|title }}
                    </span>

                </div>

                <a class="btn btn-danger nav-btn"
                   href="{% url 'logout' %}">

                   Logout

                </a>

            {% else %}

                <a class="btn btn-light nav-btn me-2"
                   href="{% url 'login' %}">

                   Login

                </a>

                <a class="btn btn-warning nav-btn"
                   href="{% url 'register' %}">

                   Register

                </a>

            {% endif %}

        </div>

    </div>

</nav>
