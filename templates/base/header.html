<!DOCTYPE html>
<html>
<head>
    <title>LMS Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">LMS</a>

        <div>
            {% if user.is_authenticated %}
                <a class="btn btn-info me-2" href="{% url 'courses' %}">
                    Courses
                </a>
                <span class="text-white me-3">
                    Welcome, {{ user.username }}
                </span>
                <a class="btn btn-danger" href="{% url 'logout' %}">
                    Logout
                </a>
            {% else %}
                <a class="btn btn-light me-2" href="{% url 'login' %}">Login</a>
                <a class="btn btn-warning" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </div>
</nav>
